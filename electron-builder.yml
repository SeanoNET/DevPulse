appId: com.devpulse.app
productName: DevPulse
copyright: Copyright © 2026 seano

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - resources/**/*
  - "!node_modules/**/*.{md,ts,map}"

extraResources:
  - from: resources/
    to: .
    filter:
      - "*.png"

asar: true

win:
  artifactName: "${productName}-Setup-${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Development
  maintainer: seano
  synopsis: Unified CI/CD event timeline
  description: >
    DevPulse aggregates events from GitHub, Jira, and Octopus Deploy
    into a unified timeline feed with configurable desktop notifications.

appImage:
  artifactName: "${productName}-${version}-${arch}.AppImage"

deb:
  artifactName: "${productName}-${version}-${arch}.deb"
  depends:
    - libnotify4
    - libsecret-1-0

publish:
  provider: github
  owner: SeanoNET
  repo: DevPulse
  releaseType: release
